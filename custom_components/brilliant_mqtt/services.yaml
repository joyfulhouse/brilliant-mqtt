repair:
  name: Repair bridge
  description: Restore the unit/env from known-good sources and start the agent.
  target:
    entity:
      integration: brilliant_mqtt
redeploy:
  name: Redeploy agent
  description: Force-push the bundled agent payload and restart the bridge.
  target:
    entity:
      integration: brilliant_mqtt
uninstall:
  name: Uninstall agent
  description: Stop, disable, and remove the agent from the panel (explicit only).
  target:
    entity:
      integration: brilliant_mqtt
reboot:
  name: Reboot panel
  description: >-
    Capture a diagnostics bundle over SSH, then reboot the panel. The panel's logs
    are volatile (lost on reboot), so diagnostics are always captured first.
  target:
    entity:
      integration: brilliant_mqtt
  fields:
    collect_diagnostics:
      name: Capture diagnostics
      description: Capture a diagnostics bundle before rebooting (saved under the config directory).
      required: false
      default: true
      selector:
        boolean:
    journal_lines:
      name: Journal lines
      description: How many current-boot journal lines to capture.
      required: false
      default: 400
      selector:
        number:
          min: 100
          max: 2000
          mode: box
          unit_of_measurement: lines
run_scene:
  name: Run Brilliant scene
  description: Run a scene on an attached Brilliant panel and wait for execution confirmation.
  fields:
    panel:
      name: Panel
      description: Attached panel slug. Omit it to use the configured scene panel.
      required: false
      selector:
        text:
    scene_id:
      name: Scene ID
      description: Stable scene ID from the selected panel's current catalog.
      required: true
      selector:
        text:
set_mode:
  name: Set Brilliant mode
  description: Set a mode on an attached Brilliant panel and wait for execution confirmation.
  fields:
    panel:
      name: Panel
      description: Attached panel slug. Omit it to use the configured scene panel.
      required: false
      selector:
        text:
    mode_id:
      name: Mode ID
      description: Stable mode ID from the selected panel's current catalog.
      required: true
      selector:
        text:
