name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage integration at repo root (monorepo keeps it in ha/)
        run: cp -r ha/custom_components ./custom_components
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage integration at repo root (monorepo keeps it in ha/)
        run: cp -r ha/custom_components ./custom_components
      - uses: hacs/action@main
        with:
          category: integration
          ignore: brands
