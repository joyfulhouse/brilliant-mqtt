name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # Brand assets are bundled in custom_components/brilliant_mqtt/brand/
          # (HA 2026.3+ brands proxy API). hacs/action still checks the brands CDN,
          # which custom-integration bundled brands aren't on — so keep skipping it.
          ignore: brands
