name: Release
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.10
      - name: Guard — manifest version must match the release tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST="$(python -c 'import json; print(json.load(open("ha/custom_components/brilliant_mqtt/manifest.json"))["version"])')"
          test "$TAG" = "$MANIFEST" || { echo "tag $TAG != manifest $MANIFEST"; exit 1; }
      - name: Build the bundled agent payload
        run: ./scripts/build_payload.sh
      - name: Build zip (manifest.json at the zip root, as HACS extracts it)
        run: cd ha/custom_components/brilliant_mqtt && zip -r ../../../brilliant_mqtt.zip . -x "*/__pycache__/*" -x "__pycache__/*"
      - name: Upload the zip to the release
        run: gh release upload "$GITHUB_REF_NAME" brilliant_mqtt.zip --clobber
        env:
          GH_TOKEN: ${{ github.token }}
